<!DOCTYPE html>
<html lang="en">
<head>
  {{> head-meta}}
</head>

<body>
  {{> header}}
  {{> menu}}

  <!-- Main Content -->
  <main class="main-container">
    <aside class="ad-rent-sign" aria-label="Advertising">
      <a class="ad-panel ad-panel--available" href="market.html" aria-label="Rent this advertising space">
        <span>Your Ad Here</span>
      </a>
      <a
        class="ad-panel ad-panel--forest"
        href="https://foresthillsweb.com/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Visit ForestHillsWeb.com">
        <span>ForestHillsWeb.com</span>
        <small>Visit sponsor</small>
      </a>
    </aside>

    <section class="card times-card" aria-labelledby="times-title">
      <div class="search-intro">
        <div class="search-emblem" aria-hidden="true">
          <img src="/icons/header-logo.png" alt="" width="64" height="64">
        </div>
        <div class="search-intro-copy">
          <p class="search-eyebrow">Shabbat & Zmanim</p>
          <h1 id="times-title">Shabbat Times</h1>
          <p class="search-subcopy">Candle lighting, Havdalah, and this week’s parsha by location.</p>
        </div>
      </div>

      <div id="inputContainer">
        <div class="input-group">
          <label for="zipCodeInput" class="input-label">
            ZIP CODE
          </label>
          <input
            type="text"
            id="zipCodeInput"
            placeholder="Enter 5-digit zip code"
            minlength="5"
            maxlength="5"
            inputmode="numeric"
            pattern="[0-9]{5}"
            aria-label="Zip code input"
            required>
        </div>

        <div class="button-grid">
          <button id="searchButton" class="btn btn-primary" aria-label="Search Shabbat times">
            <box-icon name='search' color='currentColor' size='xs'></box-icon>
            Search
          </button>
          <button id="locationButton" class="btn btn-secondary" aria-label="Use current location">
            <box-icon name='current-location' type='solid' color='currentColor' size='xs'></box-icon>
            Current Location
          </button>
        </div>

        <div class="action-buttons">
          <button id="resetButton" class="btn btn-ghost" aria-label="Reset search">
            <box-icon name='reset' color='currentColor' size='xs'></box-icon>
            Reset
          </button>
          <button id="copyButton" class="btn btn-ghost" style="display: none;" aria-label="Copy times to clipboard">
            <box-icon name='copy' color='currentColor' size='xs'></box-icon>
            Copy Times
          </button>
        </div>
      </div>

      <div id="loadingIndicator" style="display: none;" role="status" aria-live="polite">
        <div class="skeleton-list" aria-hidden="true">
          <div class="skeleton-row"><span class="skeleton-bar skeleton-bar--label"></span><span class="skeleton-bar skeleton-bar--value"></span></div>
          <div class="skeleton-row"><span class="skeleton-bar skeleton-bar--label"></span><span class="skeleton-bar skeleton-bar--value"></span></div>
          <div class="skeleton-row"><span class="skeleton-bar skeleton-bar--label"></span><span class="skeleton-bar skeleton-bar--value"></span></div>
        </div>
        <span class="sr-only">Fetching Shabbat times...</span>
      </div>

      <div id="shabbatTimes" role="region" aria-live="polite" aria-label="Shabbat times results"></div>

      <div id="copyFeedback" class="feedback-message" style="display: none;" role="alert">
        <box-icon name='check-circle' type='solid' color='#10b981' size='sm'></box-icon>
        Shabbat times copied to clipboard!
      </div>
    </section>

    <aside class="ad-more-grid" aria-label="Additional advertising spaces">
      <a class="ad-slot" href="market.html" aria-label="Rent this advertising space">
        <span>Your Ad Here</span>
      </a>
      <a class="ad-slot" href="market.html" aria-label="Rent this advertising space">
        <span>Your Ad Here</span>
      </a>
      <a class="ad-slot" href="market.html" aria-label="Rent this advertising space">
        <span>Your Ad Here</span>
      </a>
    </aside>
  </main>

  {{> footer}}

  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
