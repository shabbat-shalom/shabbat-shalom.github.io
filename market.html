<!DOCTYPE html>
<html lang="en">
<head>
  {{> head-meta}}
</head>

<body>
  {{> header}}
  {{> menu}}

  <main class="rent-container">
    <div class="rent-header">
      <p class="rent-eyebrow">Sponsor Jewish Times</p>
      <h1 class="rent-title">Rent Ad Space</h1>
      <p class="rent-subtitle">Reach people checking Shabbat times, Zmanim, and Jewish calendar details.</p>
    </div>

    <section class="rent-layout" aria-labelledby="rent-form-title">
      <div class="rent-info">
        <h2>Available placements</h2>
        <ul class="rent-placement-list">
          <li>Top homepage banner</li>
          <li>Below Shabbat times card</li>
          <li>Dedicated sponsor placement</li>
        </ul>
      </div>

      <form class="rent-form" action="https://formspree.io/f/mwvdgdge" method="POST">
        <input type="hidden" name="_subject" value="New Jewish Times ad space inquiry">

        <h2 id="rent-form-title">Ad inquiry</h2>

        <div class="rent-field-grid">
          <div class="rent-field">
            <label for="ad-name">Name</label>
            <input id="ad-name" name="name" type="text" autocomplete="name" required>
          </div>

          <div class="rent-field">
            <label for="ad-email">Email</label>
            <input id="ad-email" name="email" type="email" autocomplete="email" required>
          </div>
        </div>

        <div class="rent-field-grid">
          <div class="rent-field">
            <label for="ad-business">Business or organization</label>
            <input id="ad-business" name="business" type="text" autocomplete="organization" required>
          </div>

          <div class="rent-field">
            <label for="ad-website">Website</label>
            <input id="ad-website" name="website" type="url" inputmode="url" placeholder="https://example.com">
          </div>
        </div>

        <div class="rent-field-grid">
          <div class="rent-field">
            <label for="ad-placement">Preferred placement</label>
            <select id="ad-placement" name="placement" required>
              <option value="">Choose one</option>
              <option value="Top homepage banner">Top homepage banner</option>
              <option value="Below Shabbat times card">Below Shabbat times card</option>
              <option value="Dedicated sponsor placement">Dedicated sponsor placement</option>
              <option value="Not sure yet">Not sure yet</option>
            </select>
          </div>

          <div class="rent-field">
            <label for="ad-budget">Monthly budget</label>
            <select id="ad-budget" name="budget" required>
              <option value="">Choose one</option>
              <option value="Under $100">Under $100</option>
              <option value="$100-$250">$100-$250</option>
              <option value="$250-$500">$250-$500</option>
              <option value="$500+">$500+</option>
            </select>
          </div>
        </div>

        <div class="rent-field">
          <label for="ad-message">Message</label>
          <textarea id="ad-message" name="message" rows="6" required></textarea>
        </div>

        <button class="btn btn-primary rent-submit" type="submit">
          <box-icon name='send' color='currentColor' size='xs'></box-icon>
          Send Inquiry
        </button>
      </form>
    </section>
  </main>

  {{> footer}}

  <script type="module" src="/src/js/shared.js"></script>
</body>
</html>
