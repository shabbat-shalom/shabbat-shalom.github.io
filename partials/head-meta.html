<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{{title}}</title>
<meta name="description" content="{{description}}">
{{#if keywords}}<meta name="keywords" content="{{keywords}}">{{/if}}
<meta name="robots" content="index, follow">
<meta name="author" content="Jewish Times">

<!-- Open Graph -->
<meta property="og:title" content="{{ogTitle}}">
<meta property="og:description" content="{{ogDescription}}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ogUrl}}">
<meta property="og:image" content="https://shabbat-shalom.github.io/logo.png">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ogTitle}}">
<meta name="twitter:description" content="{{ogDescription}}">
<meta name="twitter:image" content="https://shabbat-shalom.github.io/logo.png">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

<!-- CSS -->
<link href="/src/css/index.css" rel="stylesheet">

<!-- PWA (manifest link injected by vite-plugin-pwa) -->
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#0038b8">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">
<meta name="theme-color" content="#0038b8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JTimes">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/icons/favicon-64.png">
<link rel="shortcut icon" href="/icons/favicon-64.png">

{{#if ads}}
<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6549017979650711" crossorigin="anonymous"></script>
{{/if}}

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-WN2J1CN6FY"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-WN2J1CN6FY');
</script>

<!-- Boxicons -->
<script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
